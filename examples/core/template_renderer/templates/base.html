{{define "base.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}} - My App</title>
</head>
<body>
<nav>
  <a href="/">Home</a>
  <a href="/about">About</a>
  <a href="/404">404</a>
</nav>

<div class="container">
  {{if eq .Title "404 - Page Not Found"}}
    {{template "404-content" .}}
  {{else}}
    {{template "content" .}}
  {{end}}
</div>
</body>
</html>
{{end}}
