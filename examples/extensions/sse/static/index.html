<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE Example</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .status { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 14px; font-weight: bold; }
        .status.connected { background: #4caf50; color: white; }
        .status.disconnected { background: #f44336; color: white; }
        button { padding: 10px 20px; border: none; border-radius: 4px; background: #0066cc; color: white; cursor: pointer; margin-right: 10px; }
        button:hover { background: #0052a3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; width: 250px; margin-right: 10px; }
        .log { background: #1a1a1a; color: #00ff00; padding: 15px; border-radius: 4px; font-family: monospace; height: 150px; overflow-y: auto; font-size: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>SSE Example</h1>

    <div class="container">
        <h2>Time Stream</h2>
        <p>Status: <span id="timeStatus" class="status disconnected">Disconnected</span></p>
        <button id="timeConnect" onclick="connectTime()">Connect</button>
        <button id="timeDisconnect" onclick="disconnectTime()" disabled>Disconnect</button>
        <div id="timeLog" class="log"></div>
    </div>

    <div class="grid">
        <div class="container">
            <h2>Notifications (with Replay)</h2>
            <p>Status: <span id="notifStatus" class="status disconnected">Disconnected</span></p>
            <p>Last Event ID: <span id="notifLastID">-</span></p>
            <button id="notifConnect" onclick="connectNotif()">Connect</button>
            <button id="notifReconnect" onclick="reconnectNotif()" disabled>Reconnect</button>
            <button id="notifDisconnect" onclick="disconnectNotif()" disabled>Disconnect</button>
            <div id="notifLog" class="log"></div>
        </div>

        <div class="container">
            <h2>Broadcast</h2>
            <p>Status: <span id="broadcastStatus" class="status disconnected">Disconnected</span></p>
            <button id="broadcastConnect" onclick="connectBroadcast()">Connect</button>
            <button id="broadcastDisconnect" onclick="disconnectBroadcast()" disabled>Disconnect</button>
            <div id="broadcastLog" class="log"></div>
        </div>
    </div>

    <div class="container">
        <h2>Send Messages</h2>
        <div>
            <input type="text" id="notifyInput" placeholder="Notification message...">
            <button onclick="sendNotification()">Store Notification</button>
            <span id="notifyResult"></span>
        </div>
        <div style="margin-top: 10px;">
            <input type="text" id="broadcastInput" placeholder="Broadcast message...">
            <button onclick="sendBroadcast()">Broadcast to All</button>
            <span id="broadcastResult"></span>
        </div>
    </div>

    <script>
        let timeSource = null, notifSource = null, broadcastSource = null, notifLastEventID = '';

        function log(elementId, message) {
            const logEl = document.getElementById(elementId);
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.textContent = '[' + time + '] ' + message;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(elementId, status) {
            const el = document.getElementById(elementId);
            el.className = 'status ' + status;
            el.textContent = status.charAt(0).toUpperCase() + status.slice(1);
        }

        function setButtons(connectId, disconnectId, connected) {
            document.getElementById(connectId).disabled = connected;
            document.getElementById(disconnectId).disabled = !connected;
        }

        function connectTime() {
            if (timeSource) return;
            setStatus('timeStatus', 'connecting');
            timeSource = new EventSource('/time');
            timeSource.addEventListener('time', (e) => log('timeLog', 'Time: ' + e.data));
            timeSource.onopen = () => { setStatus('timeStatus', 'connected'); setButtons('timeConnect', 'timeDisconnect', true); };
            timeSource.onerror = (e) => { log('timeLog', 'Error: ' + JSON.stringify(e)); console.error('Time SSE Error:', e); };
        }

        function disconnectTime() {
            if (timeSource) { timeSource.close(); timeSource = null; setStatus('timeStatus', 'disconnected'); setButtons('timeConnect', 'timeDisconnect', false); }
        }

        function connectNotif() { if (notifSource) return; doConnectNotif(null); }

        function doConnectNotif(lastID) {
            setStatus('notifStatus', 'connecting');
            const url = lastID ? '/notifications?last_id=' + encodeURIComponent(lastID) : '/notifications';
            notifSource = new EventSource(url);
            notifSource.addEventListener('info', (e) => { notifLastEventID = e.lastEventId; document.getElementById('notifLastID').textContent = notifLastEventID; log('notifLog', 'ℹ️ ' + e.data); });
            notifSource.addEventListener('auto', (e) => { notifLastEventID = e.lastEventId; document.getElementById('notifLastID').textContent = notifLastEventID; log('notifLog', '⚡ ' + e.data); });
            notifSource.addEventListener('notification', (e) => { notifLastEventID = e.lastEventId; document.getElementById('notifLastID').textContent = notifLastEventID; log('notifLog', '📢 ' + e.data); });
            notifSource.onopen = () => { setStatus('notifStatus', 'connected'); document.getElementById('notifConnect').disabled = true; document.getElementById('notifReconnect').disabled = true; document.getElementById('notifDisconnect').disabled = false; };
            notifSource.onerror = (e) => { log('notifLog', 'Error: ' + e); console.error('SSE Error:', e); };
        }

        function disconnectNotif() {
            if (notifSource) { notifSource.close(); notifSource = null; setStatus('notifStatus', 'disconnected'); document.getElementById('notifConnect').disabled = false; document.getElementById('notifReconnect').disabled = !notifLastEventID; document.getElementById('notifDisconnect').disabled = true; }
        }

        function reconnectNotif() { if (notifSource || !notifLastEventID) return; doConnectNotif(notifLastEventID); }

        function connectBroadcast() {
            if (broadcastSource) return;
            setStatus('broadcastStatus', 'connecting');
            broadcastSource = new EventSource('/broadcast');
            broadcastSource.addEventListener('info', (e) => log('broadcastLog', 'ℹ️ ' + e.data));
            broadcastSource.addEventListener('broadcast', (e) => log('broadcastLog', '📡 ' + e.data));
            broadcastSource.onopen = () => { setStatus('broadcastStatus', 'connected'); setButtons('broadcastConnect', 'broadcastDisconnect', true); };
            broadcastSource.onerror = (e) => { log('broadcastLog', 'Error: ' + e); console.error('Broadcast SSE Error:', e); };
        }

        function disconnectBroadcast() { if (broadcastSource) { broadcastSource.close(); broadcastSource = null; setStatus('broadcastStatus', 'disconnected'); setButtons('broadcastConnect', 'broadcastDisconnect', false); } }

        function sendNotification() { fetch('/notify?msg=' + encodeURIComponent(document.getElementById('notifyInput').value), {method: 'POST'}).then(r => r.text()).then(t => { document.getElementById('notifyResult').textContent = t; setTimeout(() => document.getElementById('notifyResult').textContent = '', 3000); }); }
        function sendBroadcast() { fetch('/broadcast?msg=' + encodeURIComponent(document.getElementById('broadcastInput').value), {method: 'POST'}).then(r => r.text()).then(t => { document.getElementById('broadcastResult').textContent = t; setTimeout(() => document.getElementById('broadcastResult').textContent = '', 3000); }); }
    </script>
</body>
</html>
