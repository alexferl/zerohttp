<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Example</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        #status { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 14px; font-weight: bold; }
        .status.connected { background: #4caf50; color: white; }
        .status.disconnected { background: #f44336; color: white; }
        .status.connecting { background: #ff9800; color: white; }
        input[type="text"] { padding: 10px; border: 1px solid #ddd; border-radius: 4px; width: 300px; margin-right: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; background: #0066cc; color: white; cursor: pointer; }
        button:hover { background: #0052a3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #messages { background: #1a1a1a; color: #00ff00; padding: 15px; border-radius: 4px; font-family: monospace; height: 300px; overflow-y: auto; }
        .message { margin: 4px 0; }
        .message.sent { color: #ffff00; }
        .message.received { color: #00ff00; }
    </style>
</head>
<body>
    <h1>WebSocket Example</h1>

    <div class="container">
        <h2>Connection</h2>
        <p>Status: <span id="status" class="status disconnected">Disconnected</span></p>
        <button id="connectBtn" onclick="connect()">Connect</button>
        <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
    </div>

    <div class="container">
        <h2>Send Message</h2>
        <input type="text" id="messageInput" placeholder="Type a message..." disabled>
        <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>

    <div class="container">
        <h2>Messages</h2>
        <div id="messages"></div>
        <button onclick="clearMessages()">Clear</button>
    </div>

    <script>
        let ws = null;
        const statusEl = document.getElementById('status');
        const messagesEl = document.getElementById('messages');

        function setStatus(status, text) {
            statusEl.className = 'status ' + status;
            statusEl.textContent = text;
        }

        function updateUI(connected) {
            document.getElementById('connectBtn').disabled = connected;
            document.getElementById('disconnectBtn').disabled = !connected;
            document.getElementById('messageInput').disabled = !connected;
            document.getElementById('sendBtn').disabled = !connected;
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + text;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = protocol + '//' + window.location.host + '/ws';

            setStatus('connecting', 'Connecting...');
            addMessage('Connecting to ' + wsUrl + '...', 'sent');

            ws = new WebSocket(wsUrl);

            ws.onopen = () => { setStatus('connected', 'Connected'); updateUI(true); addMessage('Connected!', 'received'); };
            ws.onmessage = (e) => addMessage('Received: ' + e.data, 'received');
            ws.onclose = () => { setStatus('disconnected', 'Disconnected'); updateUI(false); addMessage('Disconnected', 'sent'); ws = null; };
            ws.onerror = (e) => addMessage('Error: ' + e, 'sent');
        }

        function disconnect() { if (ws) ws.close(); }

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const text = document.getElementById('messageInput').value.trim();
            if (!text) return;
            ws.send(text);
            addMessage('Sent: ' + text, 'sent');
            document.getElementById('messageInput').value = '';
        }

        function clearMessages() { messagesEl.innerHTML = ''; }

        document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
